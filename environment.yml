name: mhh
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Scientific stack
  - numpy>=1.24,<3
  - pandas>=2.0,<3
  - xarray>=2023.6
  - netcdf4>=1.6
  - scipy>=1.11
  - scikit-learn>=1.3
  # Plotting
  - matplotlib>=3.7
  - seaborn>=0.12
  # Geospatial (used by Figure 4 / Figure 6 base maps; optional but recommended)
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - pyogrio>=0.7
  # Notebook / dashboard
  - ipywidgets>=8.0
  - jupyterlab>=4.0
  # YAML config
  - pyyaml>=6.0
  # Trend statistics (Methods §4.6 modified Mann-Kendall + bootstrap CIs)
  - pip
  - pip:
      - pymannkendall>=1.4.3
      - isimip-client>=1.0
      - tqdm>=4.65
