# =============================================================================
# MHH Pipeline Configuration: ISIMIP3b over Europe
# =============================================================================
# This config reproduces the original hardcoded pipeline settings for
# ISIMIP3b bias-adjusted projections (MPI-ESM1-2-HR) at 0.5-degree daily
# resolution over Europe (35-70N, 15W-40E).

dataset:
  name: "ISIMIP3b Europe"
  id: "isimip3b"

# -----------------------------------------------------------------------------
# Paths (Google Drive layout for Colab)
# -----------------------------------------------------------------------------
paths:
  output_root: "/content/drive/MyDrive/Work/MHH"
  input_data: "/content/drive/MyDrive/Work/MHH/Data/ISIMIP_Models"

# -----------------------------------------------------------------------------
# Spatial domain
# -----------------------------------------------------------------------------
spatial:
  region_name: "Europe"
  grid_resolution_deg: 0.5
  bounds:
    lat_min: 35.0
    lat_max: 70.0
    lon_min: -15.0
    lon_max: 40.0

# -----------------------------------------------------------------------------
# Time periods and scenarios
# -----------------------------------------------------------------------------
time_periods:
  historical:
    start: "1981-01-01"
    end: "2010-12-31"
    label: "historical_1981_2010"
    file_decades:
      - "1981_1990"
      - "1991_2000"
      - "2001_2010"
  mid_century:
    start: "2031-01-01"
    end: "2060-12-31"
    label: "mid_2031_2060"
    file_decades:
      - "2031_2040"
      - "2041_2050"
      - "2051_2060"
  late_century:
    start: "2071-01-01"
    end: "2100-12-31"
    label: "late_2071_2100"
    file_decades:
      - "2071_2080"
      - "2081_2090"
      - "2091_2100"

scenarios:
  - "historical"
  - "ssp126"
  - "ssp370"
  - "ssp585"

# -----------------------------------------------------------------------------
# Output naming
# -----------------------------------------------------------------------------
output_folder_prefix: "MHH_DBSCAN_Europe"

# -----------------------------------------------------------------------------
# File naming conventions
# -----------------------------------------------------------------------------
file_naming:
  pattern_type: "isimip"
  model_detection:
    - prefix: "h08_"
      source: "H08"
      model: "H08"
    - prefix: "mpi"
      source: "MPI-ESM1-2-HR"
      model: "MPI-ESM1-2-HR"
  time_decode_workarounds:
    h08_1601_epoch: true

# -----------------------------------------------------------------------------
# Variables
# -----------------------------------------------------------------------------
# Each key is a variable the pipeline will process. Add or remove freely.
# The pipeline iterates over whatever is listed here.
variables:
  pr:
    long_name: "Precipitation"
    file_pattern: "_pr_"
    nc_var_name: "pr"
    units: "kg m-2 s-1"
    extreme_type: "high"
    percentile_strict: 0.99
    percentile_relaxed: 0.90
    fixed_threshold: 0.00023148  # 20.0 mm/day / 86400
    use_fixed_as_minimum: true
    dbscan:
      eps_space_deg: 1.5
      eps_time_days: 1.0
      min_samples: 15
      max_gap_days: 2

  tasmax:
    long_name: "Daily Maximum Temperature"
    file_pattern: "_tasmax_"
    nc_var_name: "tasmax"
    units: "K"
    extreme_type: "high"
    percentile_strict: 0.95
    percentile_relaxed: 0.90
    fixed_threshold: 308.15
    use_fixed_as_minimum: true
    dbscan:
      eps_space_deg: 1.0
      eps_time_days: 3.0
      min_samples: 20
      max_gap_days: 5

  sfcwind:
    long_name: "Near-Surface Wind Speed"
    file_pattern: "_sfcwind_"
    nc_var_name: "sfcwind"
    units: "m s-1"
    extreme_type: "high"
    percentile_strict: 0.99
    percentile_relaxed: 0.90
    fixed_threshold: 17.2
    use_fixed_as_minimum: true
    dbscan:
      eps_space_deg: 1.5
      eps_time_days: 1.0
      min_samples: 15
      max_gap_days: 2

  ps:
    long_name: "Surface Air Pressure"
    file_pattern: "_ps_"
    nc_var_name: "ps"
    units: "Pa"
    extreme_type: "low"
    percentile_strict: 0.05
    percentile_relaxed: 0.15
    fixed_threshold: 99000.0
    use_fixed_as_minimum: false
    dbscan:
      eps_space_deg: 1.5
      eps_time_days: 1.0
      min_samples: 20
      max_gap_days: 2

  qtot:
    long_name: "Total Runoff"
    file_pattern: "_qtot_"
    nc_var_name: "qtot"
    units: "kg m-2 s-1"
    extreme_type: "high"
    percentile_strict: 0.99
    percentile_relaxed: 0.90
    fixed_threshold: 0.00023148  # 20.0 mm/day / 86400
    use_fixed_as_minimum: true
    dbscan:
      eps_space_deg: 1.5
      eps_time_days: 2.0
      min_samples: 15
      max_gap_days: 4

  soilmoist_wet:
    long_name: "Soil Moisture (Wet)"
    file_pattern: "_soilmoist_"
    nc_var_name: "soilmoist"
    units: "kg m-2"
    extreme_type: "high"
    percentile_strict: 0.80
    percentile_relaxed: 0.70
    fixed_threshold: null
    use_fixed_as_minimum: false
    dbscan:
      eps_space_deg: 1.0
      eps_time_days: 3.0
      min_samples: 20
      max_gap_days: 10

  soilmoist_dry:
    long_name: "Soil Moisture (Dry)"
    file_pattern: "_soilmoist_"
    nc_var_name: "soilmoist"
    units: "kg m-2"
    extreme_type: "low"
    percentile_strict: 0.05
    percentile_relaxed: 0.15
    fixed_threshold: null
    use_fixed_as_minimum: false
    dbscan:
      eps_space_deg: 1.0
      eps_time_days: 7.0
      min_samples: 25
      max_gap_days: 14

  hurs_high:
    long_name: "Relative Humidity (High)"
    file_pattern: "_hurs_"
    nc_var_name: "hurs"
    units: "%"
    extreme_type: "high"
    percentile_strict: 0.95
    percentile_relaxed: 0.75
    fixed_threshold: 95.0
    use_fixed_as_minimum: false
    dbscan:
      eps_space_deg: 1.5
      eps_time_days: 1.0
      min_samples: 15
      max_gap_days: 2

  hurs_low:
    long_name: "Relative Humidity (Low)"
    file_pattern: "_hurs_"
    nc_var_name: "hurs"
    units: "%"
    extreme_type: "low"
    percentile_strict: 0.05
    percentile_relaxed: 0.20
    fixed_threshold: 30.0
    use_fixed_as_minimum: false
    dbscan:
      eps_space_deg: 1.0
      eps_time_days: 3.0
      min_samples: 20
      max_gap_days: 6

  pr_deficit:
    long_name: "Precipitation Deficit (30-day)"
    file_pattern: "_pr_"
    nc_var_name: "pr"
    units: "kg m-2 s-1"
    extreme_type: "low"
    percentile_strict: 0.10
    percentile_relaxed: 0.20
    fixed_threshold: null
    use_fixed_as_minimum: false
    rolling_window_days: 30
    dbscan:
      eps_space_deg: 1.0
      eps_time_days: 7.0
      min_samples: 25
      max_gap_days: 14

# -----------------------------------------------------------------------------
# Multi-hazard rules
# -----------------------------------------------------------------------------
# Each rule defines a compound hazard type. Variables must reference keys
# from the variables section above.
multi_hazard_rules:
  windstorm:
    enabled: true
    description: "Compound windstorm: cyclone (ps) with surface wind effects"
    time_lag_days: 2
    primary:
      variables: ["ps"]
      min_required: 1
    conditioning:
      variables: ["sfcwind"]
      min_required: 1

  flood:
    enabled: true
    description: "Compound flood: extreme precipitation with runoff/wet soil"
    time_lag_days: 7
    primary:
      variables: ["pr"]
      min_required: 1
    conditioning:
      variables: ["qtot", "soilmoist_wet"]
      min_required: 1

  heat_drought_fire:
    enabled: true
    description: "Compound heatwave: extreme heat with drought/dryness indicators"
    time_lag_days: 14
    primary:
      variables: ["tasmax"]
      min_required: 1
    conditioning:
      variables: ["hurs_low", "soilmoist_dry", "pr_deficit"]
      min_required: 1
